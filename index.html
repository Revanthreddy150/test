<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useas App Store</title>
    <style>
        :root { --play-green: #01875f; --bg: #f1f3f4; --text: #202124; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Layout */
        header { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; margin-bottom: 25px; }
        #logo-trigger { cursor: pointer; margin: 0; color: #5f6368; }
        .container { max-width: 900px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        /* App Card */
        .card { background: #fff; padding: 15px; border-radius: 18px; text-align: center; border: 1px solid #e0e0e0; position: relative; }
        .card img { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; background: #f9f9f9; }
        .app-title { font-weight: 600; margin: 12px 0 4px; font-size: 15px; }
        .app-meta { font-size: 12px; color: #70757a; margin-bottom: 12px; }

        /* Progress Bar */
        .prog-cont { display: none; width: 100%; background: #eee; height: 8px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .prog-bar { width: 0%; height: 100%; background: var(--play-green); transition: width 0.1s; }
        .prog-text { font-size: 11px; color: var(--play-green); font-weight: bold; }

        .install-btn { background: var(--play-green); color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Admin Tools */
        #admin-panel { display: none; background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--play-green); margin-bottom: 25px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .admin-btns { display: flex; gap: 10px; }
        .delete-btn { color: red; cursor: pointer; font-size: 12px; margin-top: 10px; background: none; border: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="logo-trigger">Useas App Store</h1>
    </header>

    <div id="admin-panel">
        <h3>Add New App</h3>
        <input type="text" id="name" placeholder="App Name">
        <input type="text" id="icon" placeholder="Icon Link (GitHub or Image URL)">
        <input type="text" id="apk" placeholder="GitHub Release APK Link">
        <div class="admin-btns">
            <button class="install-btn" onclick="saveApp()">Save to Store</button>
            <button class="install-btn" style="background:#5f6368" onclick="closeAdmin()">Close</button>
        </div>
        <div id="manage-list"></div>
    </div>

    <div class="grid" id="app-grid"></div>
</div>

<script>
    let clicks = 0;
    const STORAGE_KEY = "useas_github_store";

    // 1. Admin Logic
    document.getElementById('logo-trigger').onclick = () => {
        clicks++;
        if (clicks === 5) {
            if (prompt("Password") === "admin123") {
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminList();
            }
            clicks = 0;
        }
    };

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    // 2. Save App
    function saveApp() {
        const name = document.getElementById('name').value;
        const icon = document.getElementById('icon').value;
        const apk = document.getElementById('apk').value;
        const date = new Date().toLocaleDateString();

        if(!name || !apk) return alert("Fill Name and APK link!");

        const apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        apps.push({ name, icon, apk, date, installs: 0 });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
        
        location.reload();
    }

    // 3. Download with Progress
    async function startDownload(index, url, filename) {
        const card = document.getElementsByClassName('card')[index];
        const pCont = card.querySelector('.prog-cont');
        const pBar = card.querySelector('.prog-bar');
        const pText = card.querySelector('.prog-text');
        const btn = card.querySelector('.install-btn');

        btn.style.display = 'none';
        pCont.style.display = 'block';

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error();
            
            const reader = response.body.getReader();
            const total = +response.headers.get('Content-Length');
            let loaded = 0;
            let chunks = [];

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                chunks.push(value);
                loaded += value.length;
                let perc = ((loaded / total) * 100).toFixed(0);
                pBar.style.width = perc + "%";
                pText.innerText = "Downloading: " + perc + "%";
            }

            const blob = new Blob(chunks);
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename + ".apk";
            a.click();

            // Update Install Count
            let apps = JSON.parse(localStorage.getItem(STORAGE_KEY));
            apps[index].installs++;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
            
            pText.innerText = "Installation Ready!";
            setTimeout(() => location.reload(), 2000);

        } catch (e) {
            alert("Live progress failed. Starting standard download...");
            window.location.href = url;
        }
    }

    // 4. UI Rendering
    function renderStore() {
        const apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const grid = document.getElementById('app-grid');
        
        if(apps.length === 0) {
            grid.innerHTML = "<p>No apps yet. Click 'Useas App Store' 5 times.</p>";
            return;
        }

        grid.innerHTML = apps.map((app, i) => `
            <div class="card">
                <img src="${app.icon || 'https://via.placeholder.com/80'}">
                <div class="app-title">${app.name}</div>
                <div class="app-meta">${app.installs} installs • ${app.date}</div>
                <div class="prog-cont"><div class="prog-bar"></div></div>
                <div class="prog-text"></div>
                <button class="install-btn" onclick="startDownload(${i}, '${app.apk}', '${app.name}')">Install</button>
            </div>
        `).join('');
    }

    function renderAdminList() {
        const apps = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        const list = document.getElementById('manage-list');
        list.innerHTML = apps.map((app, i) => `
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:13px;">
                <span>${app.name}</span>
                <button class="delete-btn" onclick="deleteApp(${i})">Delete</button>
            </div>
        `).join('');
    }

    function deleteApp(i) {
        let apps = JSON.parse(localStorage.getItem(STORAGE_KEY));
        apps.splice(i, 1);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(apps));
        renderStore();
        renderAdminList();
    }

    window.onload = renderStore;
</script>

</body>
</html>
